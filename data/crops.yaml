meta:
  schemaVersion: "1.0"
  region: universal
  lastUpdated: "2026-06-04"
  notes: "Universal crop biology reference data. Prices are regional — see regions/. Display strings (temp/cycle/system) removed in spec-02."

entities:
  greens_mix:
    label: "Mixed leafy greens"
    cat: Leafy
    yld: 20          # kg/m²/yr — conservative coupled-system end (docs/research/crop-greens_mix.md: 28 was best-case)
    price: 4.5       # €/kg direct-sale
    seedCost: 9      # €/m²/yr
    cycleDays: 38    # days to first harvest
    cMin: 14         # preferred root-zone °C (min) → good pairing
    cMax: 22         # preferred root-zone °C (max)
    caMin: 8         # tolerable root-zone °C (min) → workable pairing
    caMax: 26        # tolerable root-zone °C (max)
    difficulty: Easy
    notes: "A forgiving staple blend with steady year-round turnover under supplementary light."

  premium_mix:
    label: "Premium herb & salad mix"
    cat: Mixed
    yld: 15          # kg/m²/yr — blended; herbs/microgreens yield less but carry the value
    price: 13        # €/kg — weighted blend of rocket €11, cutting herbs €12, basil €14, premium salad (docs/research)
    seedCost: 14
    cycleDays: 30
    cMin: 14         # moderate band — a cool-to-temperate blend; warm items (basil) compromise
    cMax: 22
    caMin: 9
    caMax: 28
    difficulty: Medium
    notes: "A realistic market-garden blend (rocket, cutting herbs, basil, premium salad) — what small operators actually grow to clear the labour wall. Higher €/m² than a single staple; manage the mixed temperature needs."

  lettuce_head:
    label: "Head lettuce"
    cat: Leafy
    yld: 22          # kg/m²/yr — conservative (docs/research/crop-lettuce_head.md: 30 achievable, not a floor)
    price: 4.0
    seedCost: 8
    unitWeightKg: 0.35  # ≈325 g/head (IGB Berlin; docs/research/crop-lettuce_head.md)
    unitLabel: "head"
    cycleDays: 35
    cMin: 13
    cMax: 20
    caMin: 8
    caMax: 24
    difficulty: Easy
    notes: "The classic aquaponics crop; loves cool water and bolts in heat."

  lettuce_leaf:
    label: "Baby leaf"
    cat: Leafy
    yld: 18          # kg/m²/yr — conservative multi-cut estimate
    price: 6.0
    seedCost: 10
    cycleDays: 25
    cMin: 13
    cMax: 20
    caMin: 8
    caMax: 24
    difficulty: Easy
    notes: "Fast cut-and-come-again leaf with a high cycle count and good margins."

  rocket:
    label: "Rocket / Rucola"
    cat: Leafy
    yld: 16          # kg/m²/yr — conservative multi-cut estimate
    price: 11
    seedCost: 9
    cycleDays: 25
    cMin: 12
    cMax: 22
    caMin: 6
    caMax: 26
    difficulty: Easy
    notes: "Peppery, fast and premium-priced; several cuts per sowing."

  basil:
    label: "Basil"
    cat: Herb
    yld: 13          # kg/m²/yr — conservative (warmth-limited in Berlin)
    price: 14
    seedCost: 12
    cycleDays: 40
    cMin: 20
    cMax: 28
    caMin: 17
    caMax: 31
    difficulty: Medium
    notes: "Top €/kg herb that loves warmth but is prone to cold damage and root rot."

  spinach:
    label: "Spinach"
    cat: Leafy
    yld: 16          # kg/m²/yr — conservative cool-season estimate
    price: 7
    seedCost: 8
    cycleDays: 35
    cMin: 10
    cMax: 18
    caMin: 5
    caMax: 22
    difficulty: Medium
    notes: "Cool-season crop that struggles and gets root disease in warm water."

  chard:
    label: "Swiss chard"
    cat: Leafy
    yld: 16          # kg/m²/yr — conservative (docs/research/crop-chard.md: 15-25 safer; ~5.3 kg/m²/cycle)
    price: 5
    seedCost: 7
    cycleDays: 48
    cMin: 14
    cMax: 24
    caMin: 9
    caMax: 28
    difficulty: Easy
    notes: "Robust, high-biomass, with a long continuous harvest window."

  pakchoi:
    label: "Pak choi"
    cat: Leafy
    yld: 13          # kg/m²/yr — conservative (docs/research/crop-pakchoi.md)
    price: 6
    seedCost: 8
    unitWeightKg: 0.3  # ≈300 g/head
    unitLabel: "head"
    cycleDays: 38
    cMin: 14
    cMax: 22
    caMin: 8
    caMax: 26
    difficulty: Easy
    notes: "Fast Asian green with reliable restaurant demand."

  feldsalat:
    label: "Lamb's lettuce"
    cat: Leafy
    yld: 7          # kg/m²/yr — conservative low-yield winter premium (docs/research/crop-feldsalat.md)
    price: 13
    seedCost: 10
    cycleDays: 50
    cMin: 8
    cMax: 16
    caMin: 4
    caMax: 20
    difficulty: Medium
    notes: "Cold-hardy winter premium — slow and low-yielding but high-priced."

  herbs:
    label: "Cutting herbs"
    cat: Herb
    yld: 14          # kg/m²/yr — conservative cutting-herb estimate
    price: 12
    seedCost: 12
    cycleDays: 45
    cMin: 16
    cMax: 24
    caMin: 12
    caMax: 28
    difficulty: Medium
    notes: "Mint, parsley and coriander mix; high value with steady demand from chefs."

  microgreens:
    label: "Microgreens"
    cat: Microgreen
    yld: 16          # kg/m²/yr — conservative tray-throughput estimate
    price: 40
    seedCost: 25
    cycleDays: 14
    cMin: 18
    cMax: 24
    caMin: 15
    caMax: 30
    difficulty: Medium
    notes: "Extremely high €/kg and very fast cycles, but labour-heavy with a short shelf life."
